name: no-secret-exposure
description: Prevent writing secrets, credentials, or API keys to files
rules:
  - action: file_write
    description: Block writing to known secret file paths
    deny:
      - pattern: '\.env$'
      - pattern: '\.env\.'
      - pattern: 'credentials'
      - pattern: '\.pem$'
      - pattern: '\.key$'
      - pattern: 'id_rsa'
      - pattern: '\.keystore$'
      - pattern: '\.p12$'
      - pattern: '\.pfx$'
      - pattern: '\.jks$'
    severity: critical
  - action: file_write
    description: Block writing content containing API keys or tokens
    deny:
      - pattern: 'API_KEY\s*='
      - pattern: 'SECRET_KEY\s*='
      - pattern: 'AWS_SECRET_ACCESS_KEY'
      - pattern: 'PRIVATE_KEY'
      - pattern: 'sk-[a-zA-Z0-9]{20,}'
    severity: high
  - action: file_write
    description: Block writing content containing platform-specific tokens
    deny:
      - pattern: 'ghp_[a-zA-Z0-9]{36}'
      - pattern: 'github_pat_[a-zA-Z0-9_]{22,}'
      - pattern: 'AKIA[0-9A-Z]{16}'
    severity: critical
  - action: file_write
    description: Block writing content containing webhooks and bearer tokens
    deny:
      - pattern: 'hooks\.slack\.com/services/'
      - pattern: 'discord\.com/api/webhooks/'
      - pattern: 'Bearer\s+[A-Za-z0-9\-._~+/]+=*'
    severity: high
  - action: file_write
    description: Block writing database connection strings with credentials
    deny:
      - pattern: '(postgres(ql)?|mysql|mongodb(\+srv)?|redis)://[^:]+:[^@]+@'
    severity: high
